    // ─── Хранилище (Firebase Firestore) ──────────────────────────
    function useTransactions() {
      const [txs, setTxs] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        const unsub = db.collection('transactions')
          .orderBy('date', 'desc')
          .onSnapshot(snap => {
            setTxs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            setError(null);
            setLoading(false);
          }, err => {
            console.error(err);
            setError(err);
            setLoading(false);
          });
        return unsub;
      }, []);

      const add = useCallback(async (tx) => {
        await db.collection('transactions').add(tx);
      }, []);

      const update = useCallback(async (id, tx) => {
        await db.collection('transactions').doc(id).set(tx);
      }, []);

      const remove = useCallback(async (id) => {
        await db.collection('transactions').doc(id).delete();
      }, []);

      const renameCategory = useCallback(async (oldCat, newCat) => {
        const snap = await db.collection('transactions').where('category', '==', oldCat).get();
        const batch = db.batch();
        snap.docs.forEach(d => batch.update(d.ref, { category: newCat }));
        await batch.commit();
      }, []);

      // Авто-миграция: Прочее → новые категории по ключевым словам в note
      const recategorize = useCallback(async (transactions) => {
        const toUpdate = [];
        transactions
          .filter(t => t.kind === 'expense' && t.category === 'Прочее' && t.note)
          .forEach(t => {
            const note = t.note.toLowerCase();
            for (const { category, keywords } of RECATEGORIZE_RULES) {
              if (keywords.some(kw => note.includes(kw))) {
                toUpdate.push({ id: t.id, category });
                break;
              }
            }
          });
        if (toUpdate.length === 0) return;
        const batch = db.batch();
        toUpdate.forEach(({ id, category }) =>
          batch.update(db.collection('transactions').doc(id), { category })
        );
        await batch.commit();
      }, []);

      useEffect(() => {
        if (!loading && txs.length > 0) recategorize(txs);
      }, [loading]);

      return { txs, add, update, remove, renameCategory, loading, error };
    }

    // ─── Круговой прогресс ────────────────────────────────────────
    function Ring({ pct, size = 96, stroke = 8 }) {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(Math.max(pct, 0), 100) / 100) * circ;
      return (
        <svg width={size} height={size} style={{ flexShrink: 0 }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E8EBDF" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#5F8C2F" strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}
            style={{ transition: 'stroke-dashoffset 0.6s ease' }}/>
        </svg>

    function Dashboard({ txs, onAdd, onOpenGoals }) {
      const cm = currentMonth();

      const totalSavings = useMemo(() =>

      const cmTxs = txs.filter(t => t.date.startsWith(cm));
      const cmIncome   = cmTxs.filter(t => t.kind === 'income').reduce((s, t) => s + t.amount, 0);
      const cmExpenses = cmTxs.filter(t => t.kind === 'expense').reduce((s, t) => s + t.amount, 0);
      const cmSavings  = cmTxs.filter(t => t.kind === 'savings').reduce((s, t) => s + t.amount, 0);
      const cashDelta = (items) => items.reduce((sum, t) => {
        if (t.kind === 'income') return sum + t.amount;
        if (t.kind === 'expense' || t.kind === 'savings') return sum - t.amount;
        return sum;
      }, 0);
      const carryoverBalance = cashDelta(txs.filter(t => t.date.slice(0, 7) < cm));
      const monthBalance = cmIncome - cmExpenses - cmSavings;
      const availableBalance = carryoverBalance + monthBalance;

      const planSavings = MONTHLY_SAVINGS_PLAN[cm] || 160000;
      const onTrack = cmSavings >= planSavings * 0.5 || cmSavings === 0;

      const recent = useMemo(() =>
        [...txs].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 5), [txs]);

      return (
        <div className="space-y-4 pb-4">

          {/* Цель */}
          <Card className="mx-4 mt-4 p-5">
            <div className="flex items-center justify-between mb-3">
              <div className="text-xs text-gray-400 font-medium uppercase tracking-wide">Цель — 600 000 ₽ к 10 ноября</div>
              <button onClick={onOpenGoals}
                className="flex items-center gap-0.5 text-xs font-semibold text-blue-600 hover:text-blue-700 cursor-pointer transition-colors py-1">
                Все цели
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                  <polyline points="9 18 15 12 9 6"/>
                </svg>
              </button>
            </div>
            <div className="flex items-center gap-4">
              <div className="relative flex-shrink-0">
                <Ring pct={pct} size={96} stroke={8}/>
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <span className="text-base font-bold text-gray-900">{Math.round(pct)}%</span>
                </div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-2xl font-bold text-gray-900 leading-tight">{fmt(totalSavings)} ₽</div>
                <div className="text-sm text-gray-400 mt-0.5">из {fmt(GOAL)} ₽</div>
                <div className="text-sm text-gray-500 mt-2">Ещё {fmt(Math.max(0, GOAL - totalSavings))} ₽ · до 10 ноября</div>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-2 mt-4">
              <div className="bg-blue-50 rounded-xl p-3 text-center">
                <div className="text-xl font-bold text-blue-700">{days}</div>
                <div className="text-xs text-blue-500 mt-0.5">дней осталось</div>
              </div>
              <div className={`rounded-xl p-3 text-center ${onTrack ? 'bg-green-50' : 'bg-amber-50'}`}>
                <div className={`flex items-center justify-center gap-1 text-sm font-semibold ${onTrack ? 'text-green-700' : 'text-amber-700'}`}>
                  {onTrack ? <Icons.Up/> : <Icons.Down/>}
                  {onTrack ? 'В графике' : 'Отстаём'}
                </div>
                <div className={`text-xs mt-0.5 ${onTrack ? 'text-green-500' : 'text-amber-500'}`}>
                  план {fmt(planSavings)} ₽/мес
                </div>
              </div>
            </div>
          </Card>

          {/* Этот месяц */}
          <div className="mx-4">
            <div className="text-sm font-semibold text-gray-600 mb-2">
              {ruMonth(cm).charAt(0).toUpperCase() + ruMonth(cm).slice(1)}
            </div>
            <Card className="mb-2 p-3">
              <div className="flex items-center justify-between text-sm">
                <span className="text-gray-500">Перенос с прошлого месяца</span>
                <span className={`font-semibold ${carryoverBalance >= 0 ? 'text-green-700' : 'text-red-700'}`}>
                  {fmt(carryoverBalance)} ₽
                </span>
              </div>
              <div className="mt-1 text-xs text-gray-400">
                Доступно сейчас = перенос + доходы месяца − расходы месяца − пополнения копилки.
              </div>
            </Card>
            {(() => {
              return (
                <div className="grid grid-cols-2 gap-2">
                  {[
                    { label: 'Доходы',    val: cmIncome,   bg: 'bg-green-50',  txt: 'text-green-700' },
                    { label: 'Расходы',   val: cmExpenses, bg: 'bg-red-50',    txt: 'text-red-700' },
                    { label: 'В копилке всего', val: totalSavings, bg: 'bg-blue-50', txt: 'text-blue-700' },
                    { label: 'Доступно сейчас', val: availableBalance, bg: availableBalance >= 0 ? 'bg-green-50' : 'bg-red-50', txt: availableBalance >= 0 ? 'text-green-700' : 'text-red-700' },
                  ].map(({ label, val, bg, txt }) => (
                    <div key={label} className={`${bg} rounded-xl p-3`}>
                      <div className={`text-sm font-bold ${txt} leading-tight`}>{fmt(val)}</div>
                      <div className="text-xs text-gray-500 mt-0.5">{label}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>

          {/* План накоплений */}
          <div className="mx-4">
            <div className="text-sm font-semibold text-gray-600 mb-2">Накопления по месяцам</div>
            <Card>
              {Object.entries(CUMULATIVE_PLAN).map(([key, target], i, arr) => {
                const monthActual = txs
                  .filter(t => t.kind === 'savings' && t.date.startsWith(key))
                  .reduce((s, t) => s + t.amount, 0);
                const cumActual = txs
                  .filter(t => t.kind === 'savings' && t.date.slice(0, 7) <= key)
                  .reduce((s, t) => s + t.amount, 0);
                const isCurrent = key === cm;
                const isPast = key < cm;
                const fillPct = Math.min((cumActual / target) * 100, 100);
                const done = cumActual >= target;
                const fillColor = done ? '#4B7026' : isPast ? '#B94A2F' : '#93B660';
                return (
                  <div key={key} className={`px-4 py-3 ${i < arr.length - 1 ? 'border-b border-gray-50' : ''} ${isCurrent ? 'bg-blue-50/60' : ''}`}>
                    <div className="flex items-center justify-between mb-1.5">
                      <div className={`text-sm font-medium capitalize ${isCurrent ? 'text-blue-700' : 'text-gray-700'}`}>
                        {ruMonth(key)}
                        {isCurrent && <span className="ml-1.5 text-xs font-normal text-blue-500">текущий</span>}
                      </div>
                      <div className="text-right">
                        <div className="text-sm font-semibold text-gray-900">план всего {fmt(target)} ₽</div>
                        {(isPast || isCurrent) && (
                          <div className={`text-xs ${done ? 'text-green-600' : 'text-gray-400'}`}>
                            за месяц {fmt(monthActual)} · всего {fmt(cumActual)}
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className="h-full rounded-full transition-[width] duration-500"
                        style={{ width: `${fillPct}%`, backgroundColor: fillColor }}/>
                    </div>
                  </div>
                );
              })}
            </Card>
          </div>

          {/* Последние операции */}
          {recent.length > 0 && (
            <div className="mx-4">
              <div className="text-sm font-semibold text-gray-600 mb-2">Последние операции</div>
              <Card className="divide-y divide-gray-50">
                {recent.map(tx => (
                  <TxRow key={tx.id} tx={tx} onDelete={null}/>
                ))}
              </Card>
            </div>
          )}

          {recent.length === 0 && (
            <div className="mx-4">
              <button onClick={onAdd}
                className="w-full border-2 border-dashed border-gray-200 rounded-2xl py-8 text-center cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition-colors group">
                <div className="w-10 h-10 bg-gray-100 group-hover:bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 transition-colors">
                  <Icons.Plus/>
                </div>
                <div className="text-sm text-gray-500">Добавьте первую операцию</div>
              </button>
            </div>
          )}
        </div>
      );
    }

    // ─── Строка транзакции ────────────────────────────────────────
    function TxRow({ tx, onDelete, onEdit }) {
      const kindMap = {
        income:  { sign: '+', bg: 'bg-green-100', txt: 'text-green-700', amtColor: 'text-green-600' },
        expense: { sign: '−', bg: 'bg-red-100',   txt: 'text-red-700',   amtColor: 'text-red-600' },
        savings: { sign: '→', bg: 'bg-blue-100',  txt: 'text-blue-700',  amtColor: 'text-blue-600' },
      };
      const k = kindMap[tx.kind] || kindMap.expense;
      return (
        <div className="flex items-center px-4 py-3 gap-3">
          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 ${k.bg} ${k.txt}`}>
            {k.sign}
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: catColor(tx.category) }}/>
              <span className="text-sm font-medium text-gray-900 truncate">{tx.category}</span>
            </div>
            <div className="flex items-center gap-1.5 mt-0.5">
              <PersonChip person={tx.person}/>
              <span className="text-xs text-gray-400">{ruDate(tx.date)}</span>
              {tx.note && <span className="text-xs text-gray-400 truncate">· {tx.note}</span>}
            </div>
          </div>
          <div className="flex items-center gap-1.5">
            <span className={`text-sm font-semibold ${k.amtColor}`}>
              {k.sign !== '→' ? k.sign : ''}{fmt(tx.amount)} ₽
            </span>
            {onEdit && (
              <button onClick={() => onEdit(tx)} aria-label="Изменить операцию"
                className="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-blue-500 cursor-pointer transition-colors rounded-lg hover:bg-blue-50">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
            )}
            {onDelete && (
              <button onClick={() => onDelete(tx.id)} aria-label="Удалить операцию"
                className="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-red-400 cursor-pointer transition-colors rounded-lg hover:bg-red-50">
                <Icons.Trash/>
              </button>
            )}
          </div>
        </div>
      );
    }

    // ─── Список операций ──────────────────────────────────────────
    function Transactions({ txs, onDelete, onEdit, onRenameCategory }) {
      const [filter, setFilter] = useState('all');
      const [showAnalytics, setShowAnalytics] = useState(false);

      const FILTERS = [
        { id: 'all',     label: 'Все' },
        { id: 'income',  label: 'Доходы' },
        { id: 'expense', label: 'Расходы' },
        { id: 'savings', label: 'Копилка' },
        { id: 'sasha',   label: 'Саша' },
        { id: 'dasha',   label: 'Даша' },
      ];

      const filtered = useMemo(() => {
        const list = filter === 'all' ? txs
          : txs.filter(t => t.kind === filter || t.person === filter);
        return [...list].sort((a, b) => b.date.localeCompare(a.date));
      }, [txs, filter]);

      const grouped = useMemo(() =>
        filtered.reduce((acc, tx) => {
          (acc[tx.date] = acc[tx.date] || []).push(tx);
          return acc;
        }, {}), [filtered]);

      return (
        <div className="pb-4">
          <div className="px-4 pt-4 pb-2 flex items-center gap-2">
            <div className="flex-1 min-w-0 overflow-x-auto hide-scrollbar">
              <div className="flex gap-2 w-max">
                {FILTERS.map(f => (
                  <Chip key={f.id} active={filter === f.id} onClick={() => setFilter(f.id)}>{f.label}</Chip>
                ))}
              </div>
            </div>
            <button onClick={() => setShowAnalytics(s => !s)}
              aria-label={showAnalytics ? 'Скрыть аналитику' : 'Показать аналитику'}
              className={`pressable flex-shrink-0 w-10 h-10 rounded-full flex items-center justify-center cursor-pointer
                ${showAnalytics ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" className="w-5 h-5">
                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
                <path d="M22 12A10 10 0 0 0 12 2v10z"/>
              </svg>
            </button>
          </div>

          {/* Аналитика — разворачивается по кнопке */}
          {showAnalytics && <CategoryAnalytics allTxs={txs} onRenameCategory={onRenameCategory}/>}

          {Object.keys(grouped).length === 0 ? (
            <div className="text-center py-20 text-gray-300">
              <div className="flex justify-center mb-2"><Icons.List/></div>
              <div className="text-sm">Операций нет</div>
            </div>
          ) : (
            Object.entries(grouped).sort(([a], [b]) => b.localeCompare(a)).map(([date, items]) => {
              const dayExpenses = items.filter(tx => tx.kind === 'expense').reduce((s, tx) => s + tx.amount, 0);
              return (
                <div key={date} className="mx-4 mt-4">
                  <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1.5 flex justify-between items-center">
                    <span>{new Date(date + 'T12:00:00').toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' })}</span>
                    {dayExpenses > 0 && (
                      <span className="text-red-500">−{dayExpenses.toLocaleString('ru-RU')} ₽</span>
                    )}
                  </div>
                  <Card className="divide-y divide-gray-50">
                    {items.map(tx => <TxRow key={tx.id} tx={tx} onDelete={onDelete} onEdit={onEdit}/>)}
                  </Card>
                </div>
              );
            })
          )}
        </div>
      );
    }

    // ─── Форма добавления ─────────────────────────────────────────
    function AddModal({ onAdd, onClose, editTx, goals = [] }) {
      const [kind, setKind]       = useState(editTx ? editTx.kind : 'expense');
      const [person, setPerson]   = useState(editTx ? editTx.person : 'dasha');
      const [amount, setAmount]   = useState(editTx ? String(editTx.amount) : '');
      const [category, setCategory] = useState(editTx ? editTx.category : '');
      const [date, setDate]       = useState(editTx ? editTx.date : todayStr());
      const [note, setNote]       = useState(editTx ? (editTx.note || '') : '');
      const [goalId, setGoalId]   = useState(editTx ? (editTx.goalId || null) : null);

      const cats = kind === 'income' ? INCOME_CATEGORIES : kind === 'expense' ? EXPENSE_CATEGORIES : [];

      function submit(e) {
        e.preventDefault();
        if (!amount || +amount <= 0) return;
        onAdd({
          kind,
          person: kind === 'savings' ? 'sasha' : person,
          amount: +amount,
          category: category || (kind === 'savings' ? 'В копилку' : kind),
          date, note,
          ...(kind === 'savings' && goalId ? { goalId } : {}),
        });
        onClose();
      }

      const KINDS = [
        { id: 'income',  label: 'Доход' },
        { id: 'expense', label: 'Расход' },
        { id: 'savings', label: 'В копилку' },
      ];

      return (
        <div className="sheet-overlay fixed inset-0 bg-black/40 z-50 flex items-end" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="sheet-panel bg-white w-full rounded-t-3xl max-h-[92vh] overflow-y-auto">
            <div className="sticky top-0 bg-white px-5 pt-5 pb-3 flex items-center justify-between border-b border-gray-100">
              <h2 className="text-base font-bold text-gray-900">{editTx ? 'Изменить операцию' : 'Новая операция'}</h2>
              <button onClick={onClose} aria-label="Закрыть" className="w-11 h-11 flex items-center justify-center rounded-full hover:bg-gray-100 cursor-pointer text-gray-500 transition-colors">
                <Icons.X/>
              </button>
            </div>

            <form onSubmit={submit} className="px-5 pt-4 pb-8 space-y-4">

              {/* Тип */}
              <div className="flex bg-gray-100 rounded-xl p-1">
                {KINDS.map(k => (
                  <button type="button" key={k.id}
                    onClick={() => { setKind(k.id); setCategory(''); }}
                    className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors cursor-pointer
                      ${kind === k.id ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500'}`}>
                    {k.label}
                  </button>
                ))}
              </div>

              {/* Участник */}
              {kind !== 'savings' && (
                <div>
                  <label className="text-xs font-medium text-gray-500 mb-1.5 block">Участник</label>
                  <div className="flex gap-2">
                    {[{ id: 'dasha', label: 'Даша', border: 'border-purple-400 bg-purple-50 text-purple-700', inactive: 'border-gray-200 text-gray-600' },
                      { id: 'sasha', label: 'Саша', border: 'border-blue-400 bg-blue-50 text-blue-700', inactive: 'border-gray-200 text-gray-600' }
                    ].map(p => (
                      <button type="button" key={p.id} onClick={() => setPerson(p.id)}
                        className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border-2 transition-colors cursor-pointer
                          ${person === p.id ? p.border : p.inactive}`}>
                        {p.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Цель (для копилки) */}
              {kind === 'savings' && goals.length > 0 && (
                <div>
                  <label className="text-xs font-medium text-gray-500 mb-1.5 block">Цель</label>
                  <div className="flex flex-wrap gap-1.5">
                    {[{ id: null, name: 'Основная' }, ...goals].map(g => (
                      <button type="button" key={g.id || 'main'} onClick={() => setGoalId(g.id)}
                        className={`px-3 py-2 rounded-xl text-xs font-medium border-2 transition-colors cursor-pointer
                          ${goalId === g.id ? 'border-blue-400 bg-blue-50 text-blue-700' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                        {g.name}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Сумма */}
              <div>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">Сумма</label>
                <div className="relative">
                  <input type="number" value={amount} onChange={e => setAmount(e.target.value)}
                    inputMode="numeric" placeholder="0" min="1" required
                    className="w-full text-2xl font-bold text-gray-900 border-2 border-gray-200 rounded-xl px-4 py-3 pr-10 focus:outline-none focus:border-blue-500 transition-colors"/>
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-xl font-medium text-gray-400">₽</span>
                </div>
              </div>

              {/* Категория */}
              {cats.length > 0 && (
                <div>
                  <label className="text-xs font-medium text-gray-500 mb-1.5 block">Категория</label>
                  <div className="grid grid-cols-3 gap-1.5">
                    {cats.map(c => (
                      <button type="button" key={c} onClick={() => setCategory(c)}
                        style={category === c ? { borderColor: catColor(c), backgroundColor: catColor(c) + '18', color: catColor(c) } : {}}
                        className={`py-2 px-1 rounded-xl text-xs font-medium border-2 transition-colors cursor-pointer flex items-center justify-center gap-1
                          ${category === c ? '' : 'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
                        <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ backgroundColor: catColor(c) }}/>
                        <span className="truncate">{c}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Дата */}
              <div>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">Дата</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)}
                  className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-blue-500 transition-colors text-base"/>
              </div>

              {/* Комментарий */}
              <div>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">Комментарий</label>
                <input type="text" value={note} onChange={e => setNote(e.target.value)}
                  placeholder="Необязательно"
                  className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-base text-gray-900 focus:outline-none focus:border-blue-500 transition-colors"/>
              </div>

              <button type="submit"
                className="pressable w-full bg-blue-600 text-white py-4 rounded-xl text-base font-semibold hover:bg-blue-700 active:bg-blue-800 cursor-pointer">
                Сохранить
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ─── План vs Факт ─────────────────────────────────────────────
    function Plan({ txs, onRenameCategory }) {
      const sel = currentMonth();

      const cmTxs = txs.filter(t => t.date.startsWith(sel));
      const actual = {
        income:  cmTxs.filter(t => t.kind === 'income').reduce((s, t) => s + t.amount, 0),
        expense: cmTxs.filter(t => t.kind === 'expense').reduce((s, t) => s + t.amount, 0),
        savings: cmTxs.filter(t => t.kind === 'savings').reduce((s, t) => s + t.amount, 0),
      };

      const planSavings = MONTHLY_SAVINGS_PLAN[sel] || 160000;
      const planIncome = INCOME_PLAN_BY_MONTH[sel] || MONTHLY_INCOME_PLAN;
      const planExpenses = planIncome - planSavings;

      const rows = [
        { label: 'Доходы',    plan: planIncome, actual: actual.income,  more: true },
        { label: 'Расходы',   plan: planExpenses,        actual: actual.expense, more: false },
        { label: 'В копилку', plan: planSavings,          actual: actual.savings, more: true },
      ];

      const cumPlan   = CUMULATIVE_PLAN[sel] || 0;
      const cumActual = txs
        .filter(t => t.kind === 'savings' && t.date.slice(0, 7) <= sel)
        .reduce((s, t) => s + t.amount, 0);
      const ahead = cumActual - cumPlan;

      // По участникам
      const persons = ['sasha', 'dasha'].map(p => {
        const ptx = cmTxs.filter(t => t.person === p);
        return {
          person: p,
          income:  ptx.filter(t => t.kind === 'income').reduce((s, t) => s + t.amount, 0),
          expense: ptx.filter(t => t.kind === 'expense').reduce((s, t) => s + t.amount, 0),
          savings: ptx.filter(t => t.kind === 'savings').reduce((s, t) => s + t.amount, 0),
        };
      });

      return (
        <div className="pb-4">
          {/* Таблица план/факт */}

    // ─── Аналитика по категориям ──────────────────────────────────
    function PieChart({ data, total, size = 260, stroke = 36 }) {
      const pad = 34; // место под подписи процентов
      const r = (size - stroke) / 2 - pad;
      const cx = size / 2, cy = size / 2;
      const C = 2 * Math.PI * r;
      let offset = 0;
      let angleAcc = -90;

      const segs = data.map(({ cat, sum }) => {
        const frac = total > 0 ? sum / total : 0;
        const len = frac * C;
        const midAngle = angleAcc + frac * 180; // середина сегмента в градусах
        const seg = { cat, len, off: offset, frac, midAngle };
        offset += len;
        angleAcc += frac * 360;
        return seg;
      });

      return (
        <div className="relative flex-shrink-0 mx-auto" style={{ width: size, height: size }}>
          <svg width={size} height={size}>
            {total === 0 && (
              <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E2E8F0" strokeWidth={stroke}/>
            )}
            {segs.map(s => (
              <circle key={s.cat} cx={cx} cy={cy} r={r} fill="none"
                stroke={catColor(s.cat)} strokeWidth={stroke} strokeLinecap="butt"
                strokeDasharray={`${Math.max(s.len - 2, 0)} ${C - Math.max(s.len - 2, 0)}`}
                strokeDashoffset={-s.off}
                transform={`rotate(-90 ${cx} ${cy})`}/>
            ))}
            {segs.filter(s => s.frac >= 0.04).map(s => {
              const rad = (s.midAngle * Math.PI) / 180;
              const lr = r + stroke / 2 + 16;
              return (
                <text key={s.cat + '_l'} x={cx + lr * Math.cos(rad)} y={cy + lr * Math.sin(rad)}
                  textAnchor="middle" dominantBaseline="middle"
                  className="fill-gray-400" style={{ fontSize: '12px', fontWeight: 600 }}>
                  {Math.round(s.frac * 100)}%
                </text>
              );
            })}
          </svg>
        </div>
      );
    }

    function CategoryAnalytics({ allTxs, onRenameCategory }) {
      const months = Object.keys(CUMULATIVE_PLAN);
      const [sel, setSel] = useState(currentMonth());
      const [person, setPerson] = useState(null);
      const [renaming, setRenaming] = useState(null);

      const allExpenses = useMemo(() =>
        allTxs.filter(t => t.kind === 'expense' && t.date.startsWith(sel)), [allTxs, sel]);

      const expenses = useMemo(() =>
        person ? allExpenses.filter(t => t.person === person) : allExpenses, [allExpenses, person]);

      const total = expenses.reduce((s, t) => s + t.amount, 0);

      const byCat = useMemo(() => {
        const map = {};
        expenses.forEach(t => { map[t.category] = (map[t.category] || 0) + t.amount; });
        return Object.entries(map)
          .map(([cat, sum]) => ({ cat, sum, pct: total > 0 ? (sum / total) * 100 : 0 }))
          .sort((a, b) => b.sum - a.sum);
      }, [expenses, total]);

      const PERSONS = [

    function CalendarView({ txs, planned, onAddPlanned, onRemovePlanned }) {
      const [showAdd, setShowAdd] = useState(false);
      const [showPast, setShowPast] = useState(false);
      const [openMonths, setOpenMonths] = useState({});
      const now = new Date();
      const todayIso = todayStr();
      const events = [];

      // Внесённые операции (последние 30 дней)
      const monthAgo = new Date(now); monthAgo.setDate(monthAgo.getDate() - 30);
      const monthAgoIso = monthAgo.toISOString().slice(0, 10);
      txs.filter(t => t.date >= monthAgoIso).forEach(t => {
        events.push({
          date: t.date,
          kind: t.kind === 'income' ? 'income' : 'expense',
          person: t.person,
          label: (t.kind === 'savings' ? '→ ' : '') + t.category + (t.note ? ` · ${t.note}` : ''),
          amount: t.amount,
          actual: true,
        });
      });

      // Регулярные плановые на 60 дней вперёд
      for (let d = 0; d <= 60; d++) {
        const dt = new Date(now);
        dt.setDate(dt.getDate() + d);
        const iso = dt.toISOString().slice(0, 10);
        const day = dt.getDate();

        SCHEDULED_INCOME.forEach(si => {
          if (si.day === day) events.push({ date: iso, kind: 'income', person: si.person, label: si.label, amount: si.amount });
        });

        SCHEDULED_BILLS.forEach(sb => {
          if (sb.day === day) events.push({ date: iso, kind: 'expense', person: sb.person, label: sb.name, amount: sb.amount });
        });

        ONE_TIME_EXPENSES.forEach(oe => {
          if (oe.date === iso) {
            events.push({ date: iso, kind: 'expense', person: oe.person, label: oe.name, amount: oe.amount, oneTime: true });
          }
        });

        BIRTHDAYS.forEach(bd => {
          if (bd.month === dt.getMonth() + 1 && bd.day === dt.getDate()) {
            events.push({ date: iso, kind: 'expense', label: `ДР — ${bd.name}`, amount: bd.amount, birthday: true });
          }
        });
      }

      // Пользовательские плановые
      planned.forEach(p => {
        events.push({ date: p.date, kind: p.kind, person: p.person, label: p.name, amount: p.amount, oneTime: true, plannedId: p.id });
      });

      const grouped = events
        .sort((a, b) => a.date.localeCompare(b.date))
        .reduce((acc, e) => { (acc[e.date] = acc[e.date] || []).push(e); return acc; }, {});

      // Разбивка: прошлое / ближайшие 3 недели / дальние месяцы
      const horizonDt = new Date(now); horizonDt.setDate(horizonDt.getDate() + 21);
      const horizonIso = horizonDt.toISOString().slice(0, 10);

      const allDates = Object.keys(grouped).sort();
      const pastDates = allDates.filter(d => d < todayIso);
      const nearDates = allDates.filter(d => d >= todayIso && d <= horizonIso);
      const farByMonth = allDates.filter(d => d > horizonIso).reduce((acc, d) => {
        const m = d.slice(0, 7);
        (acc[m] = acc[m] || []).push(d);
        return acc;
      }, {});

      const sumKind = (dates, kind) => dates.reduce((s, d) =>
        s + grouped[d].filter(e => e.kind === kind).reduce((a, e) => a + e.amount, 0), 0);

      const ChevronIcon = ({ open }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
          className={`w-4 h-4 transition-transform ${open ? 'rotate-180' : ''}`}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      );

      const renderDay = (date) => {
        const evts = grouped[date];
        const isToday = date === todayIso;
        const isPast = date < todayIso;
        const dayIncome  = evts.filter(e => e.kind === 'income').reduce((s, e) => s + e.amount, 0);
        const dayExpense = evts.filter(e => e.kind === 'expense').reduce((s, e) => s + e.amount, 0);
        return (
          <div key={date} className="mx-4 mt-4">
            <div className="flex items-center gap-2 mb-1.5">
              <div className={`text-xs font-semibold uppercase tracking-wide ${isToday ? 'text-blue-600' : isPast ? 'text-gray-300' : 'text-gray-400'}`}>
                {isToday ? 'Сегодня — ' : ''}
                {new Date(date + 'T12:00:00').toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' })}
              </div>
              <div className="flex gap-1 ml-auto">
                {dayIncome  > 0 && <span className="text-xs font-medium text-green-600">+{fmt(dayIncome)}</span>}
                {dayExpense > 0 && <span className="text-xs font-medium text-red-500">−{fmt(dayExpense)}</span>}
              </div>
            </div>
            <Card className={`divide-y divide-gray-50 ${isPast ? 'opacity-70' : ''}`}>
              {evts.map((e, i) => (
                <div key={i} className="flex items-center px-4 py-3 gap-3">
                  <div className={`w-2 h-2 rounded-full flex-shrink-0 ${e.birthday ? 'bg-pink-400' : e.actual ? (e.kind === 'income' ? 'bg-green-600' : 'bg-gray-800') : e.kind === 'income' ? 'bg-green-300' : e.oneTime ? 'bg-amber-400' : 'bg-red-300'}`}/>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm text-gray-900 font-medium truncate">{e.label}</div>
                    <div className="flex items-center gap-1.5">
                      <PersonChip person={e.person}/>
                      <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded ${e.actual ? 'bg-gray-100 text-gray-500' : 'bg-amber-50 text-amber-600'}`}>
                        {e.actual ? 'факт' : 'план'}
                      </span>
                    </div>
                  </div>
                  <div className={`text-sm font-semibold ${e.kind === 'income' ? 'text-green-600' : 'text-red-500'}`}>
                    {e.kind === 'income' ? '+' : '−'}{fmt(e.amount)} ₽
                  </div>
                  {e.plannedId && (
                    <button onClick={() => onRemovePlanned(e.plannedId)} aria-label="Удалить плановую операцию"
                      className="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-red-400 cursor-pointer transition-colors rounded-lg hover:bg-red-50">
                      <Icons.Trash/>
                    </button>
                  )}
                </div>
              ))}
            </Card>
          </div>
        );
      };

      return (
        <div className="pb-4">
          <div className="px-4 pt-4 pb-1 flex items-start justify-between gap-3">
            <div>
              <div className="text-sm font-semibold text-gray-600">Календарь</div>
              <div className="text-xs text-gray-400 mt-0.5">Ближайшие 3 недели + планы на будущее</div>
            </div>
            <button onClick={() => setShowAdd(true)}
              className="pressable flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl cursor-pointer flex-shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" className="w-3.5 h-3.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Плановая трата
            </button>
          </div>

          {/* Прошедшее — свёрнуто */}
          {pastDates.length > 0 && (
            <div className="mx-4 mt-3">
              <button onClick={() => setShowPast(s => !s)}
                className="w-full flex items-center justify-between bg-gray-100 hover:bg-gray-200 rounded-xl px-4 py-3 cursor-pointer transition-colors">
                <span className="text-sm font-medium text-gray-500">
                  Прошедшие дни · {pastDates.reduce((s, d) => s + grouped[d].length, 0)} операций
                </span>
                <span className="text-gray-400"><ChevronIcon open={showPast}/></span>
              </button>
            </div>
          )}
          {showPast && pastDates.map(renderDay)}

          {/* Ближайшие 3 недели — развёрнуто */}
          {nearDates.map(renderDay)}

          {/* Дальше — по месяцам, свёрнуто */}
          {Object.entries(farByMonth).map(([month, dates]) => {
            const open = !!openMonths[month];
            const inc = sumKind(dates, 'income');
            const exp = sumKind(dates, 'expense');
            const monthName = ruMonth(month);
            return (
              <React.Fragment key={month}>
                <div className="mx-4 mt-4">
                  <button onClick={() => setOpenMonths(m => ({ ...m, [month]: !m[month] }))}
                    className="w-full flex items-center justify-between bg-white border border-gray-100 rounded-xl px-4 py-3.5 cursor-pointer hover:bg-gray-50 transition-colors"
                    style={{ boxShadow: '0 1px 3px rgba(15,23,42,0.04)' }}>
                    <span className="text-sm font-semibold text-gray-700 capitalize">{monthName}</span>
                    <span className="flex items-center gap-2">
                      {inc > 0 && <span className="text-xs font-medium text-green-600">+{fmt(inc)}</span>}
                      {exp > 0 && <span className="text-xs font-medium text-red-500">−{fmt(exp)}</span>}
                      <span className="text-gray-400"><ChevronIcon open={open}/></span>
                    </span>
                  </button>
                </div>
                {open && dates.map(renderDay)}
              </React.Fragment>
            );
          })}

          {showAdd && <AddPlannedModal onAdd={onAddPlanned} onClose={() => setShowAdd(false)}/>}
        </div>
      );
    }

                  <input type="number" value={amount} onChange={e => setAmount(e.target.value)}
                    inputMode="numeric" placeholder="0" min="1" required autoFocus
                    className="w-full text-2xl font-bold text-gray-900 border-2 border-gray-200 rounded-xl px-4 py-3 pr-10 focus:outline-none focus:border-blue-500 transition-colors"/>
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-xl font-medium text-gray-400">₽</span>
                </div>
              </div>
              <div>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">Дата</label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)}
                  className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-blue-500 transition-colors text-base"/>
              </div>
              <button type="submit"
                className="pressable w-full bg-blue-600 text-white py-4 rounded-xl text-base font-semibold hover:bg-blue-700 active:bg-blue-800 cursor-pointer">
                Пополнить
              </button>
            </form>
          </div>
        </div>
      );
    }

    function EditMainGoalModal({ mainGoal, onSave, onClose }) {
      const [target, setTarget]     = useState(String(mainGoal.target));
      const [deadline, setDeadline] = useState(mainGoal.deadline);

      function submit(e) {
        e.preventDefault();
        if (!target || +target <= 0 || !deadline) return;
        onSave({ target: +target, deadline });
        onClose();
      }

      return (
        <div className="sheet-overlay fixed inset-0 bg-black/40 z-50 flex items-end" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="sheet-panel bg-white w-full rounded-t-3xl">
            <div className="px-5 pt-5 pb-3 flex items-center justify-between border-b border-gray-100">
              <h2 className="text-base font-bold text-gray-900">Основная цель</h2>
              <button onClick={onClose} aria-label="Закрыть" className="w-11 h-11 flex items-center justify-center rounded-full hover:bg-gray-100 cursor-pointer text-gray-500 transition-colors">
                <Icons.X/>
              </button>
            </div>
            <form onSubmit={submit} className="px-5 pt-4 pb-8 space-y-4">
              <div>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">Сколько накопить</label>
                <div className="relative">
                  <input type="number" value={target} onChange={e => setTarget(e.target.value)}
                    inputMode="numeric" min="1" required
                    className="w-full text-xl font-bold text-gray-900 border-2 border-gray-200 rounded-xl px-4 py-3 pr-10 focus:outline-none focus:border-blue-500 transition-colors"/>
                  <span className="absolute right-4 top-1/2 -translate-y-1/2 text-lg font-medium text-gray-400">₽</span>
                </div>
              </div>
              <div>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">Срок</label>
                <input type="date" value={deadline} onChange={e => setDeadline(e.target.value)} required
                  className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-gray-900 focus:outline-none focus:border-blue-500 transition-colors text-base"/>
              </div>
              <button type="submit"
                className="pressable w-full bg-blue-600 text-white py-4 rounded-xl text-base font-semibold hover:bg-blue-700 active:bg-blue-800 cursor-pointer">
                Сохранить
              </button>
            </form>
          </div>
        </div>
      );
    }

    function GoalPlanModal({ goal, txs, isMain, onClose }) {
      const cm = currentMonth();

      // Список месяцев от текущего до месяца дедлайна
      const months = [];
      let m = cm;
      const endM = goal.deadline.slice(0, 7);
      while (m <= endM && months.length < 36) {
        months.push(m);
        const d = new Date(m + '-01T12:00:00');
        d.setMonth(d.getMonth() + 1);
        m = d.toISOString().slice(0, 7);
      }

      const goalTxs = txs.filter(t => t.kind === 'savings' && (isMain ? !t.goalId : t.goalId === goal.id));
      const saved = goalTxs.reduce((s, t) => s + t.amount, 0);
      const remaining = Math.max(0, goal.target - saved);

      // Дефолтный план семьи — рукописный; иначе равными долями
      const isDefaultPlan = isMain && goal.target === DEFAULT_MAIN_GOAL.target && goal.deadline === DEFAULT_MAIN_GOAL.deadline;
      const evenMonthly = months.length > 0 ? Math.ceil(remaining / months.length) : 0;
      const planFor = (mm) => isDefaultPlan ? (MONTHLY_SAVINGS_PLAN[mm] || 160000) : evenMonthly;
      const factFor = (mm) => goalTxs.filter(t => t.date.startsWith(mm)).reduce((s, t) => s + t.amount, 0);

      const savedBefore = goalTxs.filter(t => t.date.slice(0, 7) < cm).reduce((s, t) => s + t.amount, 0);
      let cumPlan = isDefaultPlan ? 0 : saved;
      let cumFact = savedBefore;

      return (
        <div className="sheet-overlay fixed inset-0 bg-black/40 z-50 flex items-end" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="sheet-panel bg-white w-full rounded-t-3xl max-h-[88vh] overflow-y-auto">
            <div className="sticky top-0 bg-white px-5 pt-5 pb-3 flex items-center justify-between border-b border-gray-100 z-10">
              <div className="min-w-0">
                <h2 className="text-base font-bold text-gray-900 truncate">План — {goal.name}</h2>
                <div className="text-xs text-gray-400 mt-0.5">{fmt(goal.target)} ₽ до {ruDate(goal.deadline)}</div>
              </div>
              <button onClick={onClose} aria-label="Закрыть" className="w-11 h-11 flex items-center justify-center rounded-full hover:bg-gray-100 cursor-pointer text-gray-500 transition-colors flex-shrink-0">
                <Icons.X/>
              </button>
            </div>

            <div className="px-5 pt-4 pb-8">
              {/* Сводка */}
              <div className="grid grid-cols-2 gap-2 mb-4">
                <div className="bg-blue-50 rounded-xl p-3">
                  <div className="text-base font-bold text-blue-700">{fmt(remaining)} ₽</div>
                  <div className="text-xs text-blue-500 mt-0.5">осталось накопить</div>
                </div>
                <div className="bg-gray-50 rounded-xl p-3">
                  <div className="text-base font-bold text-gray-700">~{fmt(months.length > 0 ? Math.ceil(remaining / months.length) : 0)} ₽</div>
                  <div className="text-xs text-gray-400 mt-0.5">в месяц ({months.length} мес.)</div>
                </div>
              </div>

              {months.length === 0 ? (
                <div className="text-center py-6 text-sm text-gray-300">Срок цели уже прошёл</div>
              ) : (
                <div className="border border-gray-100 rounded-2xl overflow-hidden">
                  <div className="grid grid-cols-4 px-4 py-2 bg-gray-50 text-xs font-semibold text-gray-400 uppercase tracking-wide">
                    <div>Месяц</div>
                    <div className="text-right">План</div>
                    <div className="text-right">Факт</div>
                    <div className="text-right">Итого план</div>
                  </div>
                  {months.map((mm, i) => {
                    const plan = planFor(mm);
                    const fact = factFor(mm);
                    cumPlan = isDefaultPlan ? (CUMULATIVE_PLAN[mm] || cumPlan + plan) : Math.min(cumPlan + plan, goal.target);
                    cumFact += fact;
                    const isCurrent = mm === cm;
                    const isPast = mm < cm;
                    const ok = fact >= plan;
                    return (
                      <div key={mm} className={`px-4 py-2.5 border-t border-gray-50 ${isCurrent ? 'bg-blue-50/60' : ''}`}>
                        <div className="grid grid-cols-4 items-baseline">
                          <div className={`text-sm capitalize ${isCurrent ? 'font-semibold text-blue-700' : 'text-gray-700'}`}>
                            {ruMonth(mm)}
                            {mm.slice(0, 4) !== cm.slice(0, 4) && <span className="text-xs text-gray-400"> '{mm.slice(2, 4)}</span>}
                          </div>
                          <div className="text-sm text-right text-gray-400">{fmt(plan)}</div>
                          <div className={`text-sm text-right font-semibold ${fact === 0 ? 'text-gray-300' : ok ? 'text-green-600' : isPast || isCurrent ? 'text-amber-600' : 'text-gray-600'}`}>
                            {fmt(fact)}
                          </div>
                          <div className="text-sm text-right text-gray-500">{fmt(Math.min(cumPlan, goal.target))}</div>
                        </div>
                        <div className="h-1 bg-gray-100 rounded-full overflow-hidden mt-1.5">
                          <div className="h-full rounded-full transition-[width] duration-500"
                            style={{ width: `${Math.min(plan > 0 ? (fact / plan) * 100 : 0, 100)}%`, backgroundColor: ok ? '#4B7026' : '#93B660' }}/>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              <div className="text-xs text-gray-400 mt-3">
                Накоплено: <span className="font-semibold text-gray-600">{fmt(saved)} ₽</span> из {fmt(goal.target)} ₽
                {savedBefore > 0 && <span> (до этого месяца — {fmt(savedBefore)} ₽)</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GoalsView({ goals, txs, mainGoal, onSaveMainGoal, onAddGoal, onRemoveGoal, onAddTx, onBack }) {
      const [showNew, setShowNew] = useState(false);
      const [funding, setFunding] = useState(null);
      const [editMain, setEditMain] = useState(false);
      const [planGoal, setPlanGoal] = useState(null);

      const savedFor = (goalId) => txs
        .filter(t => t.kind === 'savings' && (goalId ? t.goalId === goalId : !t.goalId))
        .reduce((s, t) => s + t.amount, 0);

      const daysTo = (d) => Math.max(0, Math.ceil((new Date(d + 'T23:59:59') - new Date()) / 86400000));

      const mainSaved = savedFor(null);

      const GoalCard = ({ name, target, deadline, saved, onFund, onRemove, onEdit, onPlan, isMain }) => {
        const pct = Math.min((saved / target) * 100, 100);
        const done = saved >= target;
        return (
          <Card className={`p-4 ${isMain ? 'border-2 border-blue-100' : ''}`}>
            <div className="flex items-start justify-between gap-2">
              <div className="min-w-0">
                <div className="text-sm font-bold text-gray-900 truncate">{name}</div>
                <div className="text-xs text-gray-400 mt-0.5">
                  до {ruDate(deadline)} · осталось {daysTo(deadline)} дн.
                </div>
              </div>
              <div className="flex flex-shrink-0 -mt-1 -mr-1">
                {onEdit && (
                  <button onClick={onEdit} aria-label={`Изменить цель ${name}`}
                    className="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-blue-500 cursor-pointer transition-colors rounded-lg hover:bg-blue-50">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                  </button>
                )}
                {onRemove && (
                  <button onClick={onRemove} aria-label={`Удалить цель ${name}`}
                    className="w-10 h-10 flex items-center justify-center text-gray-300 hover:text-red-400 cursor-pointer transition-colors rounded-lg hover:bg-red-50">
                    <Icons.Trash/>
                  </button>
                )}
              </div>
            </div>

            <div className="mt-3 h-2.5 bg-gray-100 rounded-full overflow-hidden">
              <div className="h-full rounded-full transition-[width] duration-500"
                style={{ width: `${pct}%`, backgroundColor: done ? '#4B7026' : '#5F8C2F' }}/>
            </div>
            <div className="flex items-baseline justify-between mt-1.5">
              <span className="text-sm font-semibold text-gray-900">{fmt(saved)} ₽ <span className="font-normal text-gray-400">из {fmt(target)}</span></span>
              <span className={`text-xs font-semibold ${done ? 'text-green-600' : 'text-gray-400'}`}>{Math.round(pct)}%</span>
            </div>

            {done ? (
              <div className="mt-3 text-center text-sm font-semibold text-green-600 bg-green-50 rounded-xl py-2.5">Цель достигнута!</div>
            ) : (
              <div className="mt-3 flex gap-2">
                {onPlan && (
                  <button onClick={onPlan}
                    className="pressable flex-1 bg-gray-50 text-gray-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-gray-100 cursor-pointer">
                    План накоплений
                  </button>
                )}
                {onFund && (
                  <button onClick={onFund}
                    className="pressable flex-1 bg-blue-50 text-blue-700 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-100 cursor-pointer">
                    Пополнить
                  </button>
                )}
              </div>
            )}
          </Card>
        );
      };

      return (
        <div className="pb-4">
          <div className="px-4 pt-4 pb-1 flex items-center justify-between gap-3">
            <button onClick={onBack}
              className="flex items-center gap-1 text-sm font-medium text-gray-500 hover:text-gray-700 cursor-pointer transition-colors py-2">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              Назад
            </button>
            <button onClick={() => setShowNew(true)}
              className="pressable flex items-center gap-1 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-3 py-2 rounded-xl cursor-pointer flex-shrink-0">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" className="w-3.5 h-3.5">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Новая цель
            </button>
          </div>

          <div className="px-4 pt-2">
            <div className="text-base font-bold text-gray-900">Цели</div>
            <div className="text-xs text-gray-400 mt-0.5">Основная копилка и ваши цели</div>
          </div>

          <div className="mx-4 mt-3 space-y-3">
            <GoalCard name="Основная цель" target={GOAL} deadline="2026-11-10" saved={mainSaved} isMain/>

            {goals.map(g => (
              <GoalCard key={g.id} name={g.name} target={g.target} deadline={g.deadline}
                saved={savedFor(g.id)}
                onFund={() => setFunding(g)}
                onRemove={() => {
                  if (window.confirm(`Удалить цель «${g.name}»? Пополнения останутся в истории операций.`)) onRemoveGoal(g.id);
                }}/>
            ))}

            {goals.length === 0 && (
              <button onClick={() => setShowNew(true)}
                className="w-full border-2 border-dashed border-gray-200 rounded-2xl py-8 text-center cursor-pointer hover:border-blue-300 hover:bg-blue-50 transition-colors group">
                <div className="w-10 h-10 bg-gray-100 group-hover:bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2 transition-colors">
                  <Icons.Plus/>
                </div>
                <div className="text-sm text-gray-500">Создайте первую цель</div>
                <div className="text-xs text-gray-400 mt-0.5">отпуск, ремонт, подушка безопасности...</div>
              </button>
            )}
          </div>

          {showNew && <NewGoalModal onAdd={onAddGoal} onClose={() => setShowNew(false)}/>}
          {funding && <FundGoalModal goal={funding} onAddTx={onAddTx} onClose={() => setFunding(null)}/>}
        </div>
      );
    }

    // ─── Нижняя навигация ─────────────────────────────────────────
    function BottomNav({ tab, setTab, onAdd }) {
      const LEFT  = [{ id: 'dashboard', label: 'Главная', Icon: Icons.Home }, { id: 'txs', label: 'Операции', Icon: Icons.List }];
      const RIGHT = [
        { id: 'plan', label: 'План', Icon: Icons.Chart },
        { id: 'checklist', label: 'Платежи', Icon: Icons.CheckList },
        { id: 'calendar', label: 'Календарь', Icon: Icons.Cal },
      ];
      const Item = ({ id, label, Icon }) => (
        <button onClick={() => setTab(id)}
          className={`flex-1 py-3 flex flex-col items-center gap-0.5 cursor-pointer transition-colors
            ${tab === id ? 'text-blue-600' : 'text-gray-400 hover:text-gray-500'}`}>
          <Icon/>
          <span className="text-[10px] font-medium">{label}</span>
        </button>
      );
      return (
        <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-gray-200 z-40">
          <div className="flex items-center max-w-lg mx-auto">
            {LEFT.map(t => <Item key={t.id} {...t}/>)}
            <div className="flex-1 flex justify-center">
              <button onClick={onAdd} aria-label="Добавить операцию"
                className="pressable w-12 h-12 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-200 cursor-pointer -mt-5">
                <Icons.Plus/>
              </button>
            </div>
            {RIGHT.map(t => <Item key={t.id} {...t}/>)}
          </div>
          <div style={{ height: 'env(safe-area-inset-bottom, 0px)' }}/>
        </div>
      );
    }

    // ─── Корень приложения ────────────────────────────────────────
    function App() {
      const [tab, setTab]       = useState('dashboard');
      const [showAdd, setShowAdd] = useState(false);
      const [editTx, setEditTx] = useState(null);
      const { txs, add, update, remove, renameCategory, loading, error: txError } = useTransactions();
      const { planned, add: addPlanned, remove: removePlanned } = usePlanned();
      const { data: checkData, toggle: toggleCheck } = useChecklist();
      const { goals, add: addGoal, remove: removeGoal } = useGoals();
      const { bills: extraBills, add: addExtraBill, remove: removeExtraBill } = useExtraBills();

      const closeModal = () => { setShowAdd(false); setEditTx(null); };
      const handleSave = (tx) => {
        if (editTx) update(editTx.id, tx);
        else add(tx);
      };

      return (
        <div className="min-h-screen bg-gray-50 max-w-lg mx-auto relative">

          {/* Шапка */}
          <div className="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-gray-100 px-4 py-3.5 flex items-center justify-between">
            <div>
              <div className="text-base font-bold text-gray-900 leading-tight">Семейный бюджет</div>
              <div className="text-xs text-gray-400">Саша и Даша</div>
            </div>
            <div className="flex items-center gap-1">
              <div className="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-xs font-bold text-blue-700">С</div>
              <div className="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center text-xs font-bold text-purple-700">Д</div>
            </div>
          </div>

          {/* Загрузка */}
          {loading && (
            <div className="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center gap-3">
              <div className="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin" style={{ animationDuration: '0.6s' }}/>
              <div className="text-sm text-gray-400">Загружаем данные...</div>
            </div>
          )}

          {txError && (
            <div className="mx-4 mt-4 rounded-2xl border border-red-100 bg-red-50 px-4 py-3 text-sm text-red-700">
              <div className="font-semibold">Не удалось загрузить операции из Firebase</div>
              <div className="mt-1 text-xs text-red-600">
                Firestore вернул отказ доступа. Данные не обязательно удалены: чаще всего нужно обновить Firestore Rules или включить авторизацию.
              </div>
              <div className="mt-2 rounded-xl bg-white/70 px-3 py-2 text-xs font-mono text-red-500 break-words">
                {txError.code || 'firebase/error'}: {txError.message || 'permission denied'}
              </div>
            </div>
          )}

          {/* Контент */}
          <div className="pb-24">
            {tab === 'dashboard' && <Dashboard txs={txs} onAdd={() => setShowAdd(true)} onOpenGoals={() => setTab('goals')}/>}
            {tab === 'goals'     && <GoalsView goals={goals} txs={txs} onAddGoal={addGoal} onRemoveGoal={removeGoal} onAddTx={add} onBack={() => setTab('dashboard')}/>}
            {tab === 'txs'       && <Transactions txs={txs} onDelete={remove} onEdit={(tx) => { setEditTx(tx); setShowAdd(true); }} onRenameCategory={renameCategory}/>}
            {tab === 'plan'      && <Plan txs={txs}/>}
            {tab === 'checklist' && <ChecklistView checkData={checkData} onToggle={toggleCheck} extraBills={extraBills} onAddExtraBill={addExtraBill} onRemoveExtraBill={removeExtraBill}/>}
            {tab === 'calendar'  && <CalendarView txs={txs} planned={planned} onAddPlanned={addPlanned} onRemovePlanned={removePlanned}/>}
          </div>

          <BottomNav tab={tab} setTab={setTab} onAdd={() => setShowAdd(true)}/>

          {showAdd && <AddModal onAdd={handleSave} onClose={closeModal} editTx={editTx} goals={goals}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
